server {
    listen 80;
    listen [::]:80;
    server_name cliento.uz www.cliento.uz;

    # HTTPS ga yo'naltirish
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cliento.uz www.cliento.uz;

    # SSL sertifikatlar (o'z yo'lingizni kiriting)
    # ssl_certificate /etc/letsencrypt/live/cliento.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cliento.uz/privkey.pem;

    root /var/www/cliento-landing/dist;
    index index.html;

    # SPA uchun to'g'ri routing:
    # MUHIM: $uri/ (directory check) olib tashlangan —
    # /tutorial kabi yo'llar directory topilsa 403 berishini oldini oladi
    location / {
        try_files $uri /index.html;
    }

    # Statik fayllar uchun kesh
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
