upstream nextjs_landing {
    server 127.0.0.1:4012;
}

server {
    listen 80;
    listen [::]:80;
    server_name cliento.uz www.cliento.uz;

    # HTTPS ga yo'naltirish
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cliento.uz www.cliento.uz;

    # SSL sertifikatlar (o'z yo'lingizni kiriting)
    # ssl_certificate /etc/letsencrypt/live/cliento.uz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cliento.uz/privkey.pem;

    # Security headers (Next.js ham qo'shadi, lekin nginx darajasida ham)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Next.js statik fayllar — nginx orqali tez serve qilish
    location /_next/static {
        alias /var/www/cliento-landing/.next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public statik fayllar (rasmlar, favicon, va h.k.)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|webmanifest)$ {
        proxy_pass http://nextjs_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Barcha boshqa so'rovlar Next.js serverga proxy
    location / {
        proxy_pass http://nextjs_landing;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
